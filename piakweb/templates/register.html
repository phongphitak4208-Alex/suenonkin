<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สมัครใช้งาน | IPS AUTOPARTS SaaS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap');

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-container {
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2d3436;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #dcdde1;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00b894;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #55efc4;
        }

        .login-link {
            margin-top: 20px;
            text-align: center;
        }

        .login-link a {
            color: #6c5ce7;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>สมัครใช้งาน IPS AUTOPARTS SaaS</h2>
        {% if messages %}
    <div style="margin: 12px 0; text-align:left;">
    {% for message in messages %}
      <div style="padding:10px;border-radius:6px;margin-bottom:8px;
                  background:#fff3cd;border:1px solid #ffeeba;color:#856404;">
        {{ message }}
      </div>
    {% endfor %}
    </div>
      {% endif %}
        <form method="post" action="/register/">
             {% csrf_token %}
            <input type="text" name="full_name" placeholder="ชื่อ-สกุล" required>
            <input type="text" name="shop_name" placeholder="ชื่อร้าน" required>
            <input type="email" name="email" placeholder="อีเมลสำหรับล็อกอิน" required>
            <input type="password" name="password" placeholder="รหัสผ่าน" required>
            <button type="submit">สมัครและเริ่มทดลองใช้ฟรี 7 วัน</button>
        </form>
        <div class="login-link">
            มีบัญชีแล้ว? <a href="/login/">ล็อกอินที่นี่</a>
        </div>
    </div>
</body>
</html>
