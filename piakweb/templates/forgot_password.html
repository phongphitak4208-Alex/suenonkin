{% extends 'base.html' %}
{% block title %}ลืมรหัสผ่าน{% endblock %}
{% block content %}
<div class="container" style="max-width:720px;">
  <h3 class="mb-3 text-center">ลืมรหัสผ่าน</h3>
  <p class="text-muted text-center">กรอกอีเมลที่สมัคร ระบบจะส่งลิงก์สำหรับตั้งรหัสใหม่</p>

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">อีเมล</label>
      <input class="form-control" type="email" name="email" required>
    </div>
    <button class="btn btn-primary w-100" type="submit">ส่งลิงก์ตั้งรหัสใหม่</button>
  </form>

  <div class="text-center mt-3">
    <a href="{% url 'login' %}">กลับไปหน้าเข้าสู่ระบบ</a>
  </div>
</div>
{% endblock %}
