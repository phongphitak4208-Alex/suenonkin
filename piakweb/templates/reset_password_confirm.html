{% extends 'base.html' %}
{% block title %}ตั้งรหัสผ่านใหม่{% endblock %}
{% block content %}
<div class="container" style="max-width:720px;">
  <h3 class="mb-3 text-center">ตั้งรหัสผ่านใหม่</h3>
  <p class="text-muted text-center">บัญชี: {{ email }}</p>

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">รหัสผ่านใหม่</label>
      <input class="form-control" type="password" name="password1" required>
    </div>
    <div class="mb-3">
      <label class="form-label">ยืนยันรหัสผ่านใหม่</label>
      <input class="form-control" type="password" name="password2" required>
    </div>
    <button class="btn btn-primary w-100" type="submit">บันทึกรหัสผ่านใหม่</button>
  </form>
</div>
{% endblock %}
